name: Job Radar

on:
  schedule:
    # Every 15 minutes. GitHub queues cron runs on shared runners, so expect some delay.
    - cron: "*/15 * * * *"
  workflow_dispatch: # Lets you trigger a check by hand from the Actions tab

concurrency:
  group: job-radar # Never let two checks race for the state file
  cancel-in-progress: false

permissions:
  contents: write # To commit back the jobs that were already notified

jobs:
  check-new-jobs:
    # Only ever run while the repository is public: those minutes are free and are never billed.
    # If the repository is ever made private the job is skipped instead of started, so no runner
    # is allocated and nothing can be charged. Check the Actions tab if the runs stop appearing.
    if: github.event.repository.private == false

    runs-on: ubuntu-latest # A standard runner. Larger runners are billed even on public repos.
    timeout-minutes: 10 # A hard ceiling, so a hung crawler can never burn time indefinitely

    defaults:
      run:
        working-directory: job_crawlers-main
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # The crawlers only talk to the job APIs and to ntfy. Flask and Selenium are for the local app.
      - run: pip install requests

      - name: Check for new jobs
        env:
          NTFY_TOPIC: ${{ vars.NTFY_TOPIC }} # A topic name, not a credential
          PYTHONIOENCODING: utf-8
        run: python job_check.py

      - name: Remember the jobs that were notified
        run: |
          if git diff --quiet -- data/seen_jobs.json; then
            echo "No new jobs, nothing to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/seen_jobs.json
          git commit -m "Remember the jobs already notified"
          git pull --rebase --autostash
          git push
